<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-neutral-950/60 backdrop-blur-xl shadow-[0_8px_32px_rgba(0,0,0,0.5)] flex items-center justify-between px-6 h-16 w-full font-manrope tracking-tight text-white">

<div class="hidden md:flex items-center space-x-8">

<a class="text-violet-400 border-b-2 border-violet-500 hover:text-white transition-colors active:scale-95 duration-200" href="#">Canvas</a>

<button class="group flex flex-col items-center space-y-1 text-neutral-500 hover:bg-neutral-900/50 hover:text-neutral-200 transition-all duration-300 ease-in-out p-3 rounded-xl">
<span class="material-symbols-outlined">auto_awesome</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Generator</span>
</button>
<button class="group flex flex-col items-center space-y-1 bg-neutral-900 text-violet-400 relative after:absolute after:right-0 after:h-8 after:w-1 after:bg-violet-500 after:rounded-l-full transition-all duration-300 ease-in-out p-3 rounded-xl">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">brush</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Magic Edit</span>
</button>
<button class="group flex flex-col items-center space-y-1 text-neutral-500 hover:bg-neutral-900/50 hover:text-neutral-200 transition-all duration-300 ease-in-out p-3 rounded-xl">
<span class="material-symbols-outlined">grid_view</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Upscale</span>
</button>

<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Layers</span>
</button>

<span class="material-symbols-outlined">tune</span>
<span class="font-inter text-[10px] font-medium uppercase tracking-widest">Presets</span>
</button>
</div>
<div class="flex flex-col items-center space-y-6 pb-4">

</button>

</button>

<div class="w-full max-w-xl glass-panel p-8 rounded-2xl shadow-[0_32px_64px_rgba(0,0,0,0.6)] animate-in fade-in zoom-in duration-300">

<div class="flex items-center space-x-3 mb-6">
<span class="text-[10px] font-semibold uppercase tracking-widest text-on-surface-variant/80">Active Process</span>
<div class="flex items-center space-x-2 text-[10px] font-bold uppercase tracking-widest">
<span class="text-on-surface-variant/60">Selection</span>
<span class="material-symbols-outlined text-[12px] text-on-surface-variant/40">chevron_right</span>
<span class="text-primary text-neon-glow">Refinement</span>
<span class="material-symbols-outlined text-[12px] text-on-surface-variant/40">chevron_right</span>
<span class="text-on-surface-variant/60">Synthesis</span>
</div>
</div>
<div class="flex items-start justify-between mb-2">
<div>
<h2 class="font-headline text-3xl font-extrabold tracking-tight bg-gradient-to-r from-white via-primary to-violet-400 bg-clip-text text-transparent text-neon-glow">
                                Magic Edit
                            </h2>
<p class="text-on-surface-variant text-sm mt-1 font-body leading-relaxed">Describe modifications using natural language.</p>
</div>
<span class="material-symbols-outlined text-primary/40 text-3xl select-none">temp_preferences_custom</span>
</div>

</div>

<button class="px-3 py-1.5 rounded-full bg-white/5 border border-white/10 hover:border-primary/40 hover:bg-primary/5 text-[11px] font-medium transition-all duration-200 text-on-surface-variant hover:text-primary">

</div>
</div>

<div class="flex items-center justify-between mt-10">
<div class="flex items-center space-x-2 text-on-surface-variant/40">
<span class="material-symbols-outlined text-sm" style="font-variation-settings: 'FILL' 1;">terminal</span>
<span class="text-[10px] font-bold tracking-widest uppercase font-label">v2.4 Core Engine</span>
</div>
<div class="flex items-center space-x-3">
<button class="px-6 py-2.5 rounded-xl text-sm font-semibold font-label text-on-surface-variant hover:text-white hover:bg-white/5 transition-all active:scale-95 duration-200">

</div>
</div>
</div>
</div>

<div class="bg-neutral-950/80 backdrop-blur-md px-3 py-1.5 rounded-lg flex items-center space-x-2 border border-white/10">
